services:
  postgres:
    image: postgres:16-alpine
    container_name: snmp-monitor-postgres
    environment:
      POSTGRES_DB: snmp_monitor
      POSTGRES_USER: snmp
      POSTGRES_PASSWORD: snmp
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
      - ./postgres/seed.sql:/docker-entrypoint-initdb.d/002-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snmp -d snmp_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - snmp-monitor-net

  api-gateway:
    build:
      context: ./api-gateway
    container_name: snmp-monitor-api
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgres://snmp:snmp@postgres:5432/snmp_monitor?sslmode=disable
      WEB_ORIGIN: http://localhost:15173
      ALERT_EMAIL_ENABLED: ${ALERT_EMAIL_ENABLED:-false}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_FROM: ${SMTP_FROM:-}
    ports:
      - "13000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - snmp-monitor-net

  collector-go:
    build:
      context: ./collector-go
    container_name: snmp-monitor-collector
    environment:
      DATABASE_URL: postgres://snmp:snmp@postgres:5432/snmp_monitor?sslmode=disable
      COLLECT_INTERVAL_SECONDS: 60
      CLEANUP_INTERVAL_SECONDS: 3600
      METRIC_SAMPLE_RETENTION_DAYS: 30
      INTERFACE_SAMPLE_RETENTION_DAYS: 30
      RESOLVED_ALERT_RETENTION_DAYS: 90
      CLEANUP_BATCH_SIZE: 5000
      SNMP_TIMEOUT_SECONDS: 3
      SNMP_RETRIES: 1
      WORKER_COUNT: 16
      GETBULK_MAX_REPETITIONS: 25
      ALERT_EMAIL_ENABLED: ${ALERT_EMAIL_ENABLED:-false}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
      ALERT_EMAIL_SEND_RESOLVED: ${ALERT_EMAIL_SEND_RESOLVED:-true}
      ALERT_EMAIL_SUBJECT_PREFIX: ${ALERT_EMAIL_SUBJECT_PREFIX:-[SNMP Monitor]}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - snmp-monitor-net

  discovery-worker:
    build:
      context: ./collector-go
      dockerfile: Dockerfile.discovery
    container_name: snmp-monitor-discovery-worker
    environment:
      DATABASE_URL: postgres://snmp:snmp@postgres:5432/snmp_monitor?sslmode=disable
      DISCOVERY_POLL_INTERVAL_SECONDS: 5
      DISCOVERY_STALE_RUNNING_SECONDS: 1800
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - snmp-monitor-net

  notifier:
    build:
      context: ./collector-go
      dockerfile: Dockerfile.notifier
    container_name: snmp-monitor-notifier
    environment:
      DATABASE_URL: postgres://snmp:snmp@postgres:5432/snmp_monitor?sslmode=disable
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_TLS_MODE: ${SMTP_TLS_MODE:-starttls}
      SMTP_TIMEOUT_SECONDS: ${SMTP_TIMEOUT_SECONDS:-10}
      SMTP_POLL_INTERVAL_SECONDS: ${SMTP_POLL_INTERVAL_SECONDS:-10}
      SMTP_BATCH_SIZE: ${SMTP_BATCH_SIZE:-50}
      SMTP_MAX_RETRIES: ${SMTP_MAX_RETRIES:-3}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - snmp-monitor-net

  web-vue3:
    build:
      context: ./web-vue3
    container_name: snmp-monitor-web
    ports:
      - "15173:80"
    depends_on:
      - api-gateway
    networks:
      - snmp-monitor-net

volumes:
  postgres-data:

networks:
  snmp-monitor-net:
    driver: bridge
